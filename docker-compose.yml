services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medassist_backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medassist_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
